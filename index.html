<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WabMeta - WhatsApp Marketing & Automation</title>
    <meta name="description" content="Powerful WhatsApp Marketing and Automation Platform" />

    <!-- ✅ Facebook SDK - LOAD EARLY -->
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId: '1434968781548162',
          cookie: true,
          xfbml: true,
          version: 'v23.0'
        });
        window.__FB_INITIALIZED__ = true;
        console.log('✅ Facebook SDK initialized from HTML');
        
        // Dispatch event so React knows SDK is ready
        window.dispatchEvent(new Event('fb-sdk-ready'));
      };

      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://connect.facebook.net/en_US/sdk.js";
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    </script>
    <!-- ✅ End Facebook SDK -->
  </head>
  <body>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
